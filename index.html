<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GregLandscape Login Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b235f;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 360px;
      background: #ffffff;
      border-radius: 14px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 22px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 0 0 12px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: 0;
      background: #16a34a;
      color: #ffffff;
      cursor: pointer;
    }

    #msg {
      margin-top: 12px;
      color: #b91c1c;
      white-space: pre-wrap;
    }

    #ok {
      margin-top: 12px;
      color: #166534;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>GregLandscape</h1>

      <input id="email" type="email" placeholder="Email" autocomplete="username" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

      <button id="loginBtn" type="button">Login</button>

      <div id="msg"></div>
      <div id="ok"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://nmbobbmqkvyuucwapaoj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tYm9iYm1xa3Z5dXVjd2FwYW9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDM5MDgsImV4cCI6MjA5MDgxOTkwOH0.L-e_JF5YnZQejSvz3hieWM3gVOdwJ91nuetFy4gv4N4";

    const msgEl = document.getElementById("msg");
    const okEl = document.getElementById("ok");

    function setError(text) {
      msgEl.textContent = text;
      okEl.textContent = "";
    }

    function setOk(text) {
      okEl.textContent = text;
      msgEl.textContent = "";
    }

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      setError("");
      setOk("");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        setError("Email and password are required.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setError(error.message);
        return;
      }

      setOk("Login successful.\nUser: " + (data.user?.email || ""));
      console.log("LOGIN_OK", data);
    }

    document.getElementById("loginBtn").addEventListener("click", login);

    document.getElementById("password").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        login();
      }
    });
  </script>
</body>
</html>
