<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GregLandscape Login Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0b235f; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { width: 360px; background: #fff; border-radius: 14px; padding: 28px; }
    h1 { margin: 0 0 20px; font-size: 22px; }
    input { width: 100%; box-sizing: border-box; padding: 12px; margin: 0 0 12px; }
    button { width: 100%; padding: 12px; border: 0; background: #16a34a; color: #fff; cursor: pointer; }
    #msg { margin-top: 12px; color: #b91c1c; white-space: pre-wrap; }
    #ok { margin-top: 12px; color: #166534; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>GregLandscape</h1>
      <input id="email" type="email" placeholder="Email" autocomplete="username" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="loginBtn" type="button">Login</button>
      <div id="msg"></div>
      <div id="ok"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "PASTE_YOUR_PROJECT_URL_HERE";
    const SUPABASE_ANON_KEY = "PASTE_YOUR_ANON_PUBLIC_KEY_HERE";

    const msgEl = document.getElementById("msg");
    const okEl = document.getElementById("ok");

    function setError(text) {
      msgEl.textContent = text;
      okEl.textContent = "";
    }

    function setOk(text) {
      okEl.textContent = text;
      msgEl.textContent = "";
    }

    if (
      !SUPABASE_URL.startsWith("https://") ||
      SUPABASE_ANON_KEY === "PASTE_YOUR_ANON_PUBLIC_KEY_HERE"
    ) {
      setError("Paste the exact Project URL and anon public key from Supabase Settings > API.");
      throw new Error("Supabase config not pasted yet.");
    }

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      setError("");
      setOk("");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        setError("Email and password are required.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setError(error.message);
        return;
      }

      setOk("Login successful.\nUser: " + (data.user?.email || ""));
      console.log("LOGIN_OK", data);
    }

    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
